{{ define "main" }}
  <div class="landing">
    <div class="landing-intro">
      <h1 class="landing-title">
        {{ with .Site.Params.homeInfoParams.Title }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}
      </h1>
      {{ with .Site.Params.homeInfoParams.Content }}
        <p class="landing-bio">{{ . }}</p>
      {{ end }}

      <div class="landing-actions">
        <a href="/posts/" class="landing-cta">Read the blog →</a>
      </div>

      {{ with .Site.Params.socialIcons }}
        <div class="landing-social">
          {{ range . }}
            <a href="{{ .url }}" class="landing-social-link" target="_blank" rel="noopener noreferrer">{{ .name }}</a>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </div>
{{ end }}
