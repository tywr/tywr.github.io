{{- .Page.Store.Set "hasPlotly" true -}}
{{ $id := printf "plot-%s" (.Get 0 | default (printf "%x" now.UnixNano)) }}
<div id="{{ $id }}" class="plotly-chart"></div>
<script>
  (function() {
    var spec = {{ .Inner | safeJS }};
    function render() {
      var style = getComputedStyle(document.documentElement);
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var layout = Object.assign({}, spec.layout || {});
      var bgColor = style.getPropertyValue('--bg').trim();
      var accentColor = style.getPropertyValue('--accent-color').trim();
      layout.paper_bgcolor = bgColor;
      layout.plot_bgcolor = bgColor;
      layout.font = Object.assign({}, layout.font || {}, {
        color: isDark ? '#d8dee9' : '#1e2a38'
      });
      if (layout.xaxis) layout.xaxis.gridcolor = isDark ? '#3b4252' : '#d8dee9';
      if (layout.yaxis) layout.yaxis.gridcolor = isDark ? '#3b4252' : '#d8dee9';
      var data = (spec.data || []).map(function(trace) {
        var t = Object.assign({}, trace);
        if (!trace.marker || !trace.marker.color) {
          t.marker = Object.assign({}, t.marker || {}, { color: accentColor });
        }
        if (!trace.line || !trace.line.color) {
          t.line = Object.assign({}, t.line || {}, { color: accentColor });
        }
        return t;
      });
      Plotly.react('{{ $id }}', data, layout, spec.config || { responsive: true });
    }
    if (window.Plotly) { render(); } else {
      document.addEventListener('plotly:loaded', render);
    }
    // re-render on theme toggle
    var obs = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.attributeName === 'data-theme') render();
      });
    });
    obs.observe(document.documentElement, { attributes: true });
  })();
</script>
