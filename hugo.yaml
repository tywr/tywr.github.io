baseURL: "https://tywr.github.io"
languageCode: en-us
title: tywr
theme: ice

caches:
  images:
    dir: :cacheDir/images

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Tanguy VIVIER
  keywords: [Blog, Portfolio]
  author: Tanguy VIVIER
  images: ["https://avatars.githubusercontent.com/tywr"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false
  greeting: Tanguy Vivier
  subtitle: Personal Blog
  description: Rough notes on things I've learned, things I want to learn, and things I just enjoy talking about.

  TocOpen: true

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/tanguy-vivier"
    - name: github
      url: "https://github.com/tywr"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 1
    - identifier: archives
      name: Archive
      url: /archives/
      weight: 2
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 4

taxonomies:
  tag: tags

pygmentsUseClasses: true
markup:
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["$$", "$$"]
          inline:
            - ["$", "$"]
  highlight:
    noClasses: false
    # anchorLineNos: true
    codeFences: true
    # guessSyntax: true
    # lineNos: true
    style: nord
